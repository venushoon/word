<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>동음이의어 마스터</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #4DA8DA;
            --secondary: #FF9A76;
            --success: #67E667;
            --danger: #FF6B6B;
            --bg: #F5F7FA;
            --text: #333;
            --q-bg: #FFF9C4;
            --q-border: #FBC02D;
        }

        /* ---------------------------------
           1. 화면 최적화 (잘림 방지 및 터치)
        --------------------------------- */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; /* 스크롤 완벽 차단 */
            font-family: 'Jua', sans-serif; /* 기본 UI 폰트 */
            background-color: var(--bg);
            color: var(--text);
            /* 귀여운 도트 배경 */
            background-image: radial-gradient(#ddd 2px, transparent 2px);
            background-size: 30px 30px;
            user-select: none; -webkit-user-select: none;
            touch-action: manipulation;
        }
        #root { width: 100%; height: 100%; }
        
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* ---------------------------------
           2. 레이아웃: N단 세로 분할 (가로로 나란히)
        --------------------------------- */
        .flex-container {
            display: flex; flex-direction: row; /* 무조건 가로로 배치 */
            width: 100%; height: 100%; 
            padding: 1.5vh 1vw; gap: 1vw;
        }

        /* 플레이어 개별 영역 */
        .player-zone {
            flex: 1; /* 가로 공간을 동일하게 나눠 가짐 */
            min-width: 0; min-height: 0; /* 넘침 방지 핵심 */
            background: white; border-radius: 3vh; padding: 1.5vh;
            display: flex; flex-direction: column; 
            border: 4px solid #FFE2E2; box-shadow: 0 0.5vh 1.5vh rgba(0,0,0,0.05);
        }
        
        .header-info { 
            display: flex; justify-content: space-between; 
            font-size: 2.5vw; color: var(--primary); 
            margin-bottom: 1vh; font-weight: bold;
        }

        /* ---------------------------------
           3. 가독성 전용 폰트 및 문제 박스
        --------------------------------- */
        .q-text {
            font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif !important; /* 가독성 최강 고딕체 */
            font-weight: bold;
        }

        .question-box {
            flex: 0 0 35%; /* 상단 35% 차지 */
            background-color: var(--q-bg);
            border: 4px solid var(--q-border);
            border-radius: 2vh; margin-bottom: 1.5vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.8vmin; color: #333;
            box-shadow: 0 0.8vh 0 var(--q-border);
            padding: 1.5vh; text-align: center;
            word-break: keep-all; line-height: 1.5;
        }

        .options-grid { 
            flex: 1; /* 남은 하단 공간 차지 */
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 1vw; 
            min-height: 0;
        }

        .option-btn {
            background: white; border: 4px solid #E1F0FA; border-radius: 2vh;
            cursor: pointer; color: #333; 
            box-shadow: 0 0.8vh 0 #E1F0FA; 
            transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
            font-size: 6vmin; 
        }
        .option-btn:active { transform: translateY(0.8vh); box-shadow: 0 0 0 #E1F0FA; }

        /* 정답/오답 효과 */
        .correct { background-color: var(--success) !important; color: white !important; border-color: #4CB94C !important; box-shadow: 0 0.8vh 0 #4CB94C !important; }
        .wrong { background-color: var(--danger) !important; color: white !important; border-color: #D9534F !important; box-shadow: 0 0.8vh 0 #D9534F !important; }

        /* ---------------------------------
           4. 설정 및 결과 창 (Jua 폰트 유지)
        --------------------------------- */
        .settings-box { 
            background: white; padding: 4vh 4vw; border-radius: 4vh; 
            border: 5px solid #FFE2E2; box-shadow: 0 1.5vh 0 #FFE2E2; 
            text-align: center; max-width: 90%; 
        }
        .settings-box h1 { color: var(--primary); font-size: 7vmin; margin: 0 0 3vh 0; text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1); }
        .opt-group { margin-bottom: 2vh; background: #FFF5F5; padding: 2vh; border-radius: 2vh; }
        .opt-group p { font-size: 4vmin; margin: 0 0 1vh 0; color: var(--secondary); }
        .setting-btn { padding: 1.5vh 2vw; margin: 0.5vh; border: none; border-radius: 1.5vh; cursor: pointer; background: white; font-size: 3vmin; font-family: 'Jua'; color: #555; box-shadow: 0 0.5vh 0 #ddd; }
        .setting-btn.selected { background: var(--secondary); color: white; box-shadow: 0 0.5vh 0 #E27A58; }
        .start-btn { padding: 2vh 4vw; font-size: 5vmin; font-family: 'Jua'; background: var(--success); color: white; border: none; border-radius: 3vh; cursor: pointer; margin-top: 2vh; box-shadow: 0 0.8vh 0 #4CB94C; }
        .start-btn:active { transform: translateY(0.8vh); box-shadow: 0 0 0 #4CB94C; }
        
        .result-cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 2vw; padding: 2vh; overflow-y: auto; height: 70vh; width: 100%;}
        .result-card { background: white; padding: 2vh 3vw; border-radius: 2vh; width: 45%; border: 4px solid #FFE2E2; box-shadow: 0 1vh 0 #FFE2E2; margin-bottom: 2vh; }
        .wrong-note { margin-top: 1.5vh; font-size: 3vmin; background: #FFF9C4; padding: 1.5vh; border-radius: 1vh; text-align: left; border: 2px dashed #FBC02D; }
        
        @media (max-width: 600px) {
            .header-info { font-size: 4vw; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 💡 1. 동음이의어 문제 데이터
        const quizData = [
            { q1: '"하늘에서 하얀 ( )이 내려요."', q2: '"잠을 자고 일어났더니 ( )이 부었어요."', a: '눈', w: ['비', '코', '손', '발', '물'] },
            { q1: '"과일 가게에서 맛있는 ( )를 샀어요."', q2: '"바다 위에 커다란 ( )가 떠 있어요."', a: '배', w: ['차', '사과', '섬', '공', '귤'] },
            { q1: '"철수는 달리기를 해서 ( )가 아파요."', q2: '"마을 입구에 튼튼한 ( )가 생겼어요."', a: '다리', w: ['팔', '도로', '허리', '건물', '발'] },
            { q1: '"초원에서 ( )이 신나게 달려요."', q2: '"친구에게 예쁜 ( )을 해야 해요."', a: '말', w: ['소', '글', '양', '편지', '개'] },
            { q1: '"어두운 ( )이 되니 별이 보여요."', q2: '"가을 산에서 ( )을 주웠어요."', a: '밤', w: ['낮', '돌', '잎', '도토리', '달'] },
            { q1: '"마당에 초록색 ( )이 무성해요."', q2: '"색종이를 붙일 때 ( )이 필요해요."', a: '풀', w: ['나무', '테이프', '꽃', '가위', '흙'] },
            { q1: '"도로에 ( )가 쌩쌩 달리고 있어요."', q2: '"따뜻한 ( )를 마시니 몸이 녹아요."', a: '차', w: ['물', '자전거', '우유', '기차', '주스'] },
            { q1: '"꽃밭에 윙윙 ( )이 날아다녀요."', q2: '"잘못을 해서 선생님께 ( )을 받았어요."', a: '벌', w: ['새', '상', '나비', '돈', '파리'] }
        ];

        // 효과음 함수
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else {
                    osc.type = 'square'; osc.frequency.setValueAtTime(220, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.15);
                }
            } catch(e) {}
        };

        const PlayerZone = ({ playerNum, duration, onGameOver }) => {
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(duration);
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [question, setQuestion] = useState(null);
            const [status, setStatus] = useState('playing');
            const [selectedId, setSelectedId] = useState(null);
            
            const generateQuestion = () => {
                // 랜덤 문제 선택
                const qTarget = quizData[Math.floor(Math.random() * quizData.length)];
                
                // 정답 1개 + 오답 배열에서 3개 랜덤 추출
                let options = [qTarget.a];
                const shuffledWrongs = [...qTarget.w].sort(() => Math.random() - 0.5);
                options.push(...shuffledWrongs.slice(0, 3));
                
                // 보기 섞기
                options.sort(() => Math.random() - 0.5);
                
                setQuestion({ q1: qTarget.q1, q2: qTarget.q2, answer: qTarget.a, options });
                setStatus('playing'); setSelectedId(null);
            };

            useEffect(() => { generateQuestion(); }, []);

            useEffect(() => {
                if (duration === 0) return; 
                if (timeLeft <= 0) {
                    onGameOver(playerNum, score, wrongAnswers);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft]);

            const handleSelect = (option) => {
                if (status !== 'playing') return;
                setSelectedId(option);
                if (option === question.answer) {
                    playSound('correct'); setStatus('correct'); setScore(prev => prev + 10);
                } else {
                    playSound('wrong'); setStatus('wrong');
                    // 오답 기록 저장 (문장이 너무 기니까 대표 단어만 저장)
                    setWrongAnswers(prev => [...prev, { q: question.answer, wrong: option, right: question.answer }]);
                }
                setTimeout(generateQuestion, 1000); // 문장 읽을 시간을 위해 1초 대기
            };

            if (!question) return <div>로딩중...</div>;

            return (
                <div className="player-zone">
                    <div className="header-info">
                        <span style={{color: ['#4DA8DA', '#FF6B6B', '#67E667', '#FF9A76'][playerNum-1]}}>
                            P{playerNum} 점수: {score}
                        </span>
                        <span>{duration === 0 ? "무제한" : `⏳ ${timeLeft}초`}</span>
                    </div>
                    {/* 고딕체 가독성 클래스 q-text 적용 */}
                    <div className="question-box q-text">
                        <div>{question.q1}</div>
                        <div style={{marginTop: '1vh'}}>{question.q2}</div>
                    </div>
                    <div className="options-grid">
                        {question.options.map((opt, idx) => {
                            let btnClass = "option-btn q-text";
                            if (status !== 'playing') {
                                if (opt === question.answer) btnClass += " correct";
                                else if (opt === selectedId) btnClass += " wrong";
                            }
                            return (
                                <button key={idx} className={btnClass} onClick={() => handleSelect(opt)}>
                                    {opt}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [gameState, setGameState] = useState('settings');
            const [playersCount, setPlayersCount] = useState(3);
            const [timeLimit, setTimeLimit] = useState(60);
            const [countdown, setCountdown] = useState(3);
            const [results, setResults] = useState([]);

            useEffect(() => {
                if (gameState === 'countdown') {
                    if (countdown > 0) {
                        const timer = setTimeout(() => setCountdown(c => c - 1), 1000);
                        return () => clearTimeout(timer);
                    } else { setGameState('playing'); setResults([]); }
                }
            }, [gameState, countdown]);

            const handleGameOver = (playerNum, score, wrongAnswers) => {
                setResults(prev => {
                    const newResults = [...prev, { playerNum, score, wrongAnswers }];
                    if (newResults.length === playersCount) setTimeout(() => setGameState('result'), 500);
                    return newResults;
                });
            };

            const renderSettings = () => (
                <div className="screen">
                    <div className="settings-box">
                        <h1>동음이의어 맞히기 📖</h1>
                        <div className="opt-group">
                            <p>👥 인원수 (단 나누기)</p>
                            {[1,2,3,4].map(n => (
                                <button key={n} className={`setting-btn ${playersCount === n ? 'selected' : ''}`} onClick={() => setPlayersCount(n)}>{n}단 (명)</button>
                            ))}
                        </div>
                        <div className="opt-group">
                            <p>⏳ 제한 시간</p>
                            {[30, 60, 120, 0].map(t => (
                                <button key={t} className={`setting-btn ${timeLimit === t ? 'selected' : ''}`} onClick={() => setTimeLimit(t)}>{t === 0 ? '무제한' : `${t}초`}</button>
                            ))}
                        </div>
                        <button className="start-btn" onClick={() => { setGameState('countdown'); setCountdown(3); }}>🚀 게임 시작!</button>
                    </div>
                </div>
            );

            const renderCountdown = () => (
                <div className="screen">
                    <h1 style={{fontSize: '30vmin', color: 'var(--danger)', textShadow: '4px 4px 0 #ddd'}}>{countdown}</h1>
                </div>
            );

            const renderPlaying = () => {
                return (
                    <div className="flex-container">
                        {Array.from({length: playersCount}).map((_, i) => (
                            <PlayerZone key={i} playerNum={i+1} duration={timeLimit} onGameOver={handleGameOver} />
                        ))}
                    </div>
                );
            };

            const renderResults = () => {
                const sortedResults = [...results].sort((a, b) => b.score - a.score);
                return (
                    <div className="screen" style={{paddingTop: '3vh'}}>
                        <h1 style={{fontSize: '8vmin', color: 'var(--primary)', margin: '0 0 2vh 0'}}>최종 결과 🎉</h1>
                        <div className="result-cards">
                            {sortedResults.map((res, idx) => (
                                <div key={res.playerNum} className="result-card">
                                    <h2 style={{margin:0, fontSize: '4vmin', color: 'var(--secondary)'}}>
                                        {idx + 1}등 - P{res.playerNum} ({res.score}점)
                                    </h2>
                                    <div className="wrong-note">
                                        <strong>📝 나의 오답 노트</strong><br/>
                                        {res.wrongAnswers.length === 0 ? 
                                            <span style={{color: '#2e7d32'}}>전부 맞혔어요! 완벽해요! ✨</span> : 
                                            <ul style={{paddingLeft: '3vw', margin: '1vh 0', fontSize: '2.5vmin'}}>
                                                {res.wrongAnswers.map((w, i) => <li key={i}><span className="q-text">정답 '{w.q}'를 '{w.wrong}'(이)라고 골랐어요!</span></li>)}
                                            </ul>
                                        }
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button className="start-btn" onClick={() => setGameState('settings')} style={{position:'absolute', bottom: '2vh'}}>다시 하기</button>
                    </div>
                );
            };

            return (
                <React.Fragment>
                    {gameState === 'settings' && renderSettings()}
                    {gameState === 'countdown' && renderCountdown()}
                    {gameState === 'playing' && renderPlaying()}
                    {gameState === 'result' && renderResults()}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
