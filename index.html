<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>유의어 터치 게임</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    
    .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .modal-in { animation: fadeIn 0.3s ease-out forwards; }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9) translateY(5px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; backdrop-filter: blur(0px); }
      100% { opacity: 1; backdrop-filter: blur(8px); }
    }

    .btn-click { transform: scale(0.92) !important; transition: transform 0.1s; }
    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    /* 모바일 화면 맞춤용 */
    .game-board-fit { max-height: calc(100dvh - 120px); }
  </style>
</head>
<body class="min-h-[100dvh] flex flex-col justify-between bg-gradient-to-br from-indigo-50 via-white to-blue-50 text-slate-800 overflow-x-hidden">

  <main class="flex-grow flex flex-col items-center justify-start md:justify-center p-3 md:p-8 w-full max-w-7xl mx-auto h-full">
    
    <header class="w-full flex items-center justify-between mb-4 md:mb-8 relative h-10 md:h-14">
      <h1 class="text-3xl md:text-5xl lg:text-6xl font-black text-blue-600 tracking-tight drop-shadow-sm absolute left-1/2 transform -translate-x-1/2 w-full text-center">
        ✨ 유의어 터치 게임
      </h1>
      <button id="restart-btn" onclick="startGame()" class="hidden absolute right-0 rounded-full px-4 py-2 text-sm md:text-xl font-bold bg-blue-100 text-blue-700 active:scale-95 transition-transform">
        🔄 다시 시작
      </button>
    </header>

    <div class="w-full grid gap-4 lg:gap-8 lg:grid-cols-[1fr_300px] xl:grid-cols-[1fr_350px] flex-grow game-board-fit">
      
      <div class="flex flex-col gap-3 md:gap-6 w-full h-full">
        <div class="grid grid-cols-3 gap-2 md:gap-6">
          <div class="rounded-2xl md:rounded-3xl bg-white p-2 md:p-5 shadow-sm border border-slate-100 flex flex-col items-center justify-center">
            <span class="text-[10px] md:text-base font-bold text-slate-400 mb-1">⏰ 남은 시간</span>
            <span id="ui-time" class="text-2xl md:text-5xl font-black text-rose-500">60초</span>
          </div>
          <div class="rounded-2xl md:rounded-3xl bg-white p-2 md:p-5 shadow-sm border border-slate-100 flex flex-col items-center justify-center">
            <span class="text-[10px] md:text-base font-bold text-slate-400 mb-1">🏆 맞힌 개수</span>
            <span id="ui-score" class="text-2xl md:text-5xl font-black text-amber-500">0개</span>
          </div>
          <div class="rounded-2xl md:rounded-3xl bg-white p-2 md:p-5 shadow-sm border border-slate-100 flex flex-col items-center justify-center">
            <span class="text-[10px] md:text-base font-bold text-slate-400 mb-1">🔥 연속 정답</span>
            <span id="ui-streak" class="text-2xl md:text-5xl font-black text-emerald-500">0</span>
          </div>
        </div>

        <div class="h-2 md:h-4 w-full bg-slate-200 rounded-full overflow-hidden shadow-inner flex-shrink-0">
          <div id="ui-progress" class="h-full bg-blue-500 transition-all duration-1000 ease-linear" style="width: 100%"></div>
        </div>

        <div class="rounded-[1.5rem] md:rounded-[3rem] border-4 border-white shadow-xl bg-white/90 backdrop-blur-md p-4 md:p-10 flex-grow flex flex-col justify-between">
          
          <div id="game-area" class="hidden flex-col h-full justify-between">
            <div class="text-center flex-shrink-0 mt-2 md:mt-4">
              <p class="mb-1 md:mb-4 text-sm md:text-2xl font-bold text-blue-400">이 낱말과 뜻이 비슷한 유의어는?</p>
              <div id="current-word" class="text-6xl md:text-8xl lg:text-9xl font-black tracking-tight text-slate-800 pop-in py-2">단어</div>
            </div>

            <div id="choices-area" class="grid grid-cols-2 gap-3 md:gap-6 mt-auto mb-2">
              </div>
            
            <p id="feedback-msg" class="text-center text-sm md:text-2xl font-bold h-6 md:h-8 transition-opacity"></p>
          </div>

          <div id="waiting-area" class="text-center my-auto flex flex-col items-center justify-center h-full">
            <span class="text-6xl md:text-8xl mb-6">🎮</span>
            <button onclick="startGame()" class="rounded-full px-12 py-5 md:px-16 md:py-6 text-2xl md:text-4xl font-bold bg-blue-500 text-white shadow-xl transition-transform active:scale-95">
              🚀 게임 시작
            </button>
          </div>
        </div>
      </div>

      <div class="hidden lg:flex flex-col gap-6 h-full">
        <div class="rounded-3xl border-4 border-white shadow-xl bg-white/90 p-8 flex-grow">
          <h2 class="text-3xl font-bold text-slate-700 mb-6 border-b-2 border-slate-100 pb-4">📝 게임 방법</h2>
          <div class="space-y-6 text-xl font-medium text-slate-600">
            <p class="flex items-start gap-3"><span class="text-2xl">1️⃣</span> <span>가운데 나타난 낱말을 읽어보세요.</span></p>
            <p class="flex items-start gap-3"><span class="text-2xl">2️⃣</span> <span>4개의 보기 중에서 뜻이 비슷한 <b>'유의어'</b>를 터치하세요.</span></p>
            <p class="flex items-start gap-3"><span class="text-2xl">3️⃣</span> <span>60초 동안 최대한 많이 찾아보세요!</span></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="w-full bg-slate-200 text-slate-500 py-4 px-4 border-t-4 border-slate-300 flex-shrink-0">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
      <div class="text-xs md:text-sm font-semibold text-center md:text-left">
        <span class="text-slate-600 text-sm md:text-base flex items-center justify-center md:justify-start gap-2">📂 선생님 단어장 설정</span>

  </footer>

  <div id="game-over-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 modal-in">
    <div class="bg-white rounded-[2rem] md:rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden text-center border-4 md:border-8 border-blue-400">
      <div class="bg-blue-500 text-white py-6 md:py-8">
        <h2 class="text-3xl md:text-6xl font-black tracking-tight text-yellow-300 drop-shadow-md">🎉 게임 종료!</h2>
      </div>
      <div class="p-6 md:p-12 space-y-6 md:space-y-8">
        <p class="text-xl md:text-3xl font-bold text-slate-600">
          60초 동안 무려 <br class="hidden md:block" />
          <span id="final-score" class="text-5xl md:text-7xl font-black text-blue-600">0</span><span class="text-2xl md:text-4xl">개의 유의어를 찾았어요!</span>
        </p>
        
        <div class="grid grid-cols-2 gap-3 md:gap-4">
          <div class="bg-slate-50 p-3 md:p-4 rounded-2xl md:rounded-3xl border-2 border-slate-100">
            <p class="text-xs md:text-lg text-slate-400 font-bold mb-1">최고 연속 정답</p>
            <p class="text-2xl md:text-4xl font-black text-emerald-500"><span id="final-best-streak">0</span>번</p>
          </div>
          <div class="bg-slate-50 p-3 md:p-4 rounded-2xl md:rounded-3xl border-2 border-slate-100">
            <p class="text-xs md:text-lg text-slate-400 font-bold mb-1">정답 정확도</p>
            <p class="text-2xl md:text-4xl font-black text-rose-500"><span id="final-accuracy">0</span>%</p>
          </div>
        </div>

        <button onclick="startGame()" class="w-full rounded-2xl md:rounded-full py-4 md:py-6 text-xl md:text-3xl font-bold bg-amber-400 text-amber-900 shadow-xl transition-transform active:scale-95">
          🔄 다시 도전하기
        </button>
      </div>
    </div>
  </div>

  <script>

착하다,선하다,나쁘다,거칠다,고약하다,무섭다,시끄럽다
나쁘다,고약하다,좋다,착하다,맑다,튼튼하다,친절하다
넓다,드넓다,좁다,짧다,작다,약하다,차갑다
좁다,비좁다,넓다,환하다,거대하다,높다,빠르다
높다,우뚝하다,낮다,얕다,작다,짧다,좁다
낮다,얕다,높다,밝다,강하다,넓다,용감하다`;

    const GAME_TIME = 60;
    const CHOICES_PER_ROUND = 4;

    let wordBank = [];
    let timeLeft = GAME_TIME;
    let started = false;
    let gameOver = false;
    let score = 0;
    let attempts = 0;
    let streak = 0;
    let bestStreak = 0;
    let usedIndices = [];
    let currentRound = null;
    let timerInterval = null;
    let isChoiceLocked = false;

    function parseCSV(csvText) {
      const lines = csvText.split("\n").map(line => line.trim()).filter(line => line);
      const words = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(",").map(c => c.trim());
        if (cols.length >= 3) {
          words.push({ word: cols[0], correct: cols[1], wrong: cols.slice(2).filter(w => w !== "") });
        }
      }
      return words;
    }

    function shuffle(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    wordBank = parseCSV(SAMPLE_CSV_DATA);

    function downloadTemplate() {
      const blob = new Blob(["\uFEFF" + SAMPLE_CSV_DATA], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "유의어단어장_기본양식.csv";
      link.click();
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      const msgEl = document.getElementById('upload-msg');
      
      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const newWordBank = parseCSV(text);
          if (newWordBank.length < 5) throw new Error("최소 5개 이상의 단어가 필요합니다.");

          wordBank = newWordBank;
          
          msgEl.className = "text-center mt-2 text-xs md:text-sm font-bold block max-w-7xl mx-auto p-2 rounded-lg bg-emerald-100 text-emerald-700";
          msgEl.innerText = `✅ 성공! 새로운 단어장이 적용되었습니다.`;
        } catch (error) {
          msgEl.className = "text-center mt-2 text-xs md:text-sm font-bold block max-w-7xl mx-auto p-2 rounded-lg bg-rose-100 text-rose-700";
          msgEl.innerText = `⚠️ 단어장 오류: 양식을 다시 확인해 주세요.`;
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function buildRound() {
      let availableIndices = wordBank.map((_, i) => i).filter(i => !usedIndices.includes(i));
      if (availableIndices.length === 0) {
        usedIndices = [];
        availableIndices = wordBank.map((_, i) => i);
      }

      const index = availableIndices[Math.floor(Math.random() * availableIndices.length)];
      const entry = wordBank[index];
      
      let wrongChoices = shuffle(entry.wrong).slice(0, CHOICES_PER_ROUND - 1);
      while(wrongChoices.length < CHOICES_PER_ROUND - 1) { wrongChoices.push("오답"); }

      const choices = shuffle([
        ...wrongChoices.map(text => ({ text, isCorrect: false })),
        { text: entry.correct, isCorrect: true }
      ]);

      usedIndices.push(index);
      return { word: entry.word, answer: entry.correct, choices };
    }

    function startGame() {
      clearInterval(timerInterval);
      timeLeft = GAME_TIME;
      score = 0;
      attempts = 0;
      streak = 0;
      bestStreak = 0;
      started = true;
      gameOver = false;
      isChoiceLocked = false;
      usedIndices = [];

      document.getElementById('game-over-modal').classList.add('hidden');
      document.getElementById('waiting-area').classList.add('hidden');
      document.getElementById('game-area').classList.remove('hidden');
      document.getElementById('game-area').classList.add('flex');
      document.getElementById('restart-btn').classList.remove('hidden'); // 다시 시작 버튼 표시
      
      updateStats();
      nextRound();

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('ui-time').innerText = `${timeLeft}초`;
        document.getElementById('ui-progress').style.width = `${(timeLeft / GAME_TIME) * 100}%`;
        
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function nextRound() {
      currentRound = buildRound();
      isChoiceLocked = false;
      
      const wordEl = document.getElementById('current-word');
      wordEl.classList.remove('pop-in');
      void wordEl.offsetWidth; 
      wordEl.innerText = currentRound.word;
      wordEl.classList.add('pop-in');

      const choicesArea = document.getElementById('choices-area');
      choicesArea.innerHTML = '';
      currentRound.choices.forEach((choice) => {
        const btn = document.createElement('button');
        /* hover 효과 완전 제거, 누를 때(active)만 반응하도록 수정 */
        btn.className = "min-h-[80px] md:min-h-[140px] rounded-2xl md:rounded-[2rem] border-4 border-slate-200 bg-white text-slate-700 text-2xl md:text-5xl font-bold shadow-sm transition-transform active:scale-95 active:bg-slate-100 break-keep leading-tight";
        btn.innerText = choice.text;
        btn.onclick = () => handleChoice(choice, btn);
        choicesArea.appendChild(btn);
      });

      const feedbackMsg = document.getElementById('feedback-msg');
      feedbackMsg.style.opacity = '0';
    }

    function handleChoice(choice, btnElement) {
      if (!started || gameOver || isChoiceLocked) return;
      isChoiceLocked = true;
      attempts++;

      btnElement.classList.add('btn-click');
      setTimeout(() => btnElement.classList.remove('btn-click'), 150);

      const feedbackMsg = document.getElementById('feedback-msg');
      feedbackMsg.style.opacity = '1';

      if (choice.isCorrect) {
        score++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        
        btnElement.className = "min-h-[80px] md:min-h-[140px] rounded-2xl md:rounded-[2rem] border-4 border-emerald-400 bg-emerald-100 text-emerald-800 text-2xl md:text-5xl font-bold shadow-sm transition-transform break-keep leading-tight";
        feedbackMsg.className = "text-center text-sm md:text-2xl font-bold h-6 md:h-8 transition-opacity text-emerald-500";
        feedbackMsg.innerText = "🎉 딩동댕! 잘했어요!";
      } else {
        streak = 0;
        btnElement.className = "min-h-[80px] md:min-h-[140px] rounded-2xl md:rounded-[2rem] border-4 border-rose-400 bg-rose-100 text-rose-800 text-2xl md:text-5xl font-bold shadow-sm transition-transform break-keep leading-tight";
        
        document.getElementById('current-word').classList.add('shake');
        setTimeout(() => document.getElementById('current-word').classList.remove('shake'), 400);

        const btns = document.getElementById('choices-area').children;
        for(let b of btns) {
          if (b.innerText === currentRound.answer) {
            b.classList.remove('border-slate-200', 'bg-white', 'text-slate-700');
            b.classList.add('border-emerald-400', 'bg-emerald-100', 'text-emerald-800');
          }
        }
        feedbackMsg.className = "text-center text-sm md:text-2xl font-bold h-6 md:h-8 transition-opacity text-rose-500";
        feedbackMsg.innerText = `앗! 정답은 '${currentRound.answer}'입니다.`;
      }

      updateStats();
      setTimeout(() => { if (!gameOver) nextRound(); }, 1200);
    }

    function updateStats() {
      document.getElementById('ui-score').innerText = `${score}개`;
      document.getElementById('ui-streak').innerText = streak;
    }

    function endGame() {
      clearInterval(timerInterval);
      started = false;
      gameOver = true;
      
      const accuracy = attempts === 0 ? 0 : Math.round((score / attempts) * 100);
      
      document.getElementById('final-score').innerText = score;
      document.getElementById('final-accuracy').innerText = accuracy;
      document.getElementById('final-best-streak').innerText = bestStreak;
      
      document.getElementById('game-over-modal').classList.remove('hidden');
      document.getElementById('restart-btn').classList.add('hidden'); // 종료 시 우측 상단 버튼 숨김
    }
  </script>
</body>
</html>
